[package]
name = "ai-work-traffic-light"
version = "0.1.0"
description = "AI Work Traffic Light — Claude Code status indicator"
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2" }

[dependencies]
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-autostart = "2"
tauri-plugin-dialog = "2"
tiny_http = "0.12"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
strip = true
