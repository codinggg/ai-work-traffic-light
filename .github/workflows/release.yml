# 跨平台构建/发布：在云端同时构建 Windows / macOS / Linux 安装包。
#
# 触发方式：
#   1) 发版：打标签并推送 ->  git tag v0.1.0 && git push origin v0.1.0
#      三平台构建完成后生成一个【草稿】Release，安装包作为附件，确认后手动点发布。
#   2) 仅测试构建：GitHub 仓库 Actions 页 -> 选本工作流 -> Run workflow（手动触发，
#      不发 Release，安装包放在该次运行的 Artifacts 里下载）。
#
# 产物：Windows .msi/.exe(nsis)、macOS .dmg/.app(Intel + Apple Silicon 各一)、
#       Linux .deb/.AppImage/.rpm（对应 tauri.conf.json 的 bundle.targets:"all"）。
name: release

on:
  push:
    tags: ['v*'] # 推 v* 标签 -> 构建 + 生成草稿 Release
  workflow_dispatch: {} # 手动触发 -> 仅构建，产物放 Artifacts

jobs:
  build:
    permissions:
      contents: write # tauri-action 创建 Release 需要写权限
    strategy:
      fail-fast: false # 某一平台失败不影响其它平台继续
      matrix:
        include:
          - platform: macos-latest # macOS Apple Silicon (arm64)
            args: --target aarch64-apple-darwin
          - platform: macos-latest # macOS Intel (x86_64)
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04 # 用较老的 22.04，AppImage 兼容更多发行版
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # Linux 系统依赖：Tauri v2(webkit2gtk-4.1) + 托盘(ayatana-appindicator)
      #  + AppImage(librsvg/patchelf) + 我们前台检测 active-win-pos-rs 的 X11 依赖(xcb/xrandr)。
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential curl wget file libssl-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libxdo-dev libxcb1-dev libxrandr-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 需装两个架构的 target；其它平台留空。
          targets: ${{ contains(matrix.platform, 'macos') && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS deps
        run: pnpm install

      - name: Build (tag 时顺带生成草稿 Release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 只有推标签时才创建 Release；手动触发时 tagName 为空 -> 只构建不发布。
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: 'AI Work Traffic Light ${{ github.ref_name }}'
          releaseBody: '下载对应平台安装包。macOS 未签名，首次打开需右键→打开（或终端 xattr -cr 应用路径）。'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 手动触发(无标签)时，把安装包作为运行产物上传，方便直接下载测试。
      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: bundles-${{ matrix.platform }}-${{ strategy.job-index }}
          path: |
            src-tauri/target/release/bundle/**
            src-tauri/target/**/release/bundle/**
          if-no-files-found: ignore
